# ============================================================
# 将以下内容合并到你现有的 pyproject.toml
# ============================================================

# 在 [project.dependencies] 中确保有：
# dependencies = [
#     "httpx>=0.27",
#     "beautifulsoup4>=4.12",
#     "markdownify>=0.13",
#     "click>=8.1",
#     "rich>=13.0",
#     "pyyaml>=6.0",
#     "tiktoken>=0.7",
# ]

# 添加以下 optional-dependencies 部分：

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "ruff>=0.4",
    "pyright>=1.1",
]
browser = [
    "playwright>=1.40",
]
llm-openai = [
    "openai>=1.30",
]
llm-anthropic = [
    "anthropic>=0.28",
]
all = [
    "webinfo2md[dev,browser,llm-openai,llm-anthropic]",
]

# 添加 pytest 配置：

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
]

# 添加 ruff 配置：

[tool.ruff]
target-version = "py310"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
ignore = ["E501"]  # line length handled by formatter
